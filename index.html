    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "ui-sans-serif", "system-ui", "-apple-system", "sans-serif"],
                        serif: ["Playfair Display", "serif"],

    <style>
        body { scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .serif { font-family: 'Playfair Display', serif; }
        #error-display { position: fixed; bottom: 0; left: 0; right: 0; background: #fee2e2; color: #991b1b; padding: 1rem; font-family: monospace; z-index: 9999; border-top: 1px solid #f87171; display: none; }
    </style>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            var display = document.getElementById('error-display');
            if (display) {
                display.style.display = 'block';
                display.innerText = 'Error: ' + msg + '\nLine: ' + line + '\nColumn: ' + col;

</head>

            </svg>
          </div>

            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-10 animate-fade-in">
              <div className="absolute inset-0 bg-stone-900/80 backdrop-blur-sm" onClick={closeModal}></div>

                      <div className="absolute inset-0 flex items-center justify-between px-4">

                        </button>
                        <button onClick={() => setActiveImageIndex(i => i === gallery.length - 1 ? 0 : i + 1)} className="p-2 bg-white/50 rounded-full shadow-sm hover:bg-white/80 transition-all">

          const [view, setView] = useState('home');
          const [activeCategory, setActiveCategory] = useState('Sve');
          const [selectedProduct, setSelectedProduct] = useState(null);
          const [activeImageIndex, setActiveImageIndex] = useState(0);

          const categories = ['Sve', ...Array.from(new Set(PRODUCTS.flatMap(p => p.categories)))];

            setView(v);
            setActiveCategory(category);
            setIsMenuOpen(false);
            window.scrollTo(0, 0);
          };

                        <h1 className="text-4xl md:text-7xl font-bold text-stone-900 mb-6 leading-tight">Mali detalji, <br /><span className="text-amber-900 italic serif">velika priča.</span></h1>
                        <p className="text-lg md:text-xl text-stone-600 mb-10 max-w-xl">Unikatni drveni dodaci koji spajaju modernu tehnologiju i tradiciju.</p>
                        <button onClick={() => navigateTo('collection')} className="px-8 py-4 bg-amber-950 text-white rounded-xl font-bold text-lg flex items-center gap-2 shadow-lg">

                      <div className="inline-flex items-center justify-center w-12 h-12 md:w-16 md:h-16 bg-amber-900 rounded-xl md:rounded-2xl mb-6 md:mb-8 shadow-xl mx-auto">
                        <MessageSquare size={24} className="text-amber-200 md:w-8 md:h-8" />
                      </div>
                      <h2 className="text-3xl md:text-5xl font-bold mb-4 md:mb-6">Imate unikatnu ideju?</h2>
                      <p className="text-base md:text-xl text-amber-100/80 mb-8 md:mb-12 max-w-2xl mx-auto leading-relaxed">Bilo da želite personaliziranu gravuru na nekom od naših proizvoda ili imate potpuno novu ideju za drveni predmet, tu smo da je oživimo.</p>

                        </a>
                      </div>

                          <img src={p.image} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt={p.name} />

                          <p className="text-amber-950 font-bold text-2xl">{p.price}</p>

                    <Logo className="w-6 h-6" dark={false} />

              {isMenuOpen && (
                <div className="fixed inset-0 z-[200] bg-white p-6 flex flex-col">
                  <div className="flex justify-between items-center mb-12">
                    <Logo className="w-8 h-8" />
                    <button onClick={() => setIsMenuOpen(false)}><X size={32} /></button>

                  </div>
                </div>
              )}

          );

        const rootElement = document.getElementById('root');
        if (rootElement) {
          const root = createRoot(rootElement);
          root.render(<App />);
        }

</body>
</html>
