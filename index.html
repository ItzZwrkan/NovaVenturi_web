                      <button onClick={() => setShowImpressumDetails(true)} className="w-full py-4 bg-amber-900/10 text-amber-900 rounded-xl font-bold hover:bg-amber-900/20 transition-all">Prikaži podatke / Details anzeigen</button>
                    ) : (
                      <div className="space-y-6 animate-fade-in">
                        <div>
                          <p className="text-xs font-bold uppercase tracking-widest text-stone-400 mb-1">Adresa</p>
                          <p className="text-lg font-medium text-stone-900">Glockenblumenstr. 46, 70563, Stuttgart</p>
                        </div>
                        <div>
                          <p className="text-xs font-bold uppercase tracking-widest text-stone-400 mb-1">Telefon</p>
                          <p className="text-lg font-medium text-stone-900">+49 178 4156300</p>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </motion.div>
            </div>
          );
        };

        const DatenschutzModal = ({ isDatenschutzOpen, setIsDatenschutzOpen }) => {
          if (!isDatenschutzOpen) return null;
          return (
            <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 animate-fade-in">
              <div className="absolute inset-0 bg-stone-900/90 backdrop-blur-md" onClick={() => setIsDatenschutzOpen(false)}></div>
              <motion.div 
                initial={{ scale: 0.95, opacity: 0 }}
                animate={{ scale: 1, opacity: 1 }}
                className="relative bg-white w-full max-w-2xl max-h-[80vh] rounded-3xl overflow-hidden shadow-2xl flex flex-col"
              >
                <div className="p-6 border-b border-stone-100 flex items-center justify-between">
                  <h2 className="text-2xl font-bold text-stone-900">Datenschutzerklärung</h2>
                  <button onClick={() => setIsDatenschutzOpen(false)} className="p-2 hover:bg-stone-100 rounded-full transition-colors">
                    <X size={24} />
                  </button>
                </div>
                <div className="p-8 md:p-12 overflow-y-auto text-stone-600 text-sm leading-relaxed space-y-6">
                  <div><h4 className="font-bold text-stone-900 mb-2">1. Datenschutz na einen Blick</h4><p>Die Nutzung dieser Website ist in der Regel ohne Angabe personenbezogener Daten möglich. Soweit na unseren Seiten personenbezogene Daten (beispielsweise Name, Anschrift oder E-Mail-Adressen im Kontaktformular) erhoben werden, erfolgt dies na freiwilliger Basis.</p></div>
                  <div><h4 className="font-bold text-stone-900 mb-2">2. Datenerfassung na našoj web stranici</h4><p>Kontaktformular: Wenn Sie uns per Kontaktformular Anfragen zukommen lassen, werden Ihre Angaben aus dem Anfrageformular inklusive der von Ihnen dort angegebenen Kontaktdaten zwecks Bearbeitung der Anfrage und für den Fall von Anschlussfragen bei uns gespeichert. Diese Daten geben wir nicht ohne Ihre Einwilligung weiter. Die Verarbeitung dieser Daten erfolgt na Grundlage von Art. 6 Abs. 1 lit. b DSGVO.</p></div>
                  <div><h4 className="font-bold text-stone-900 mb-2">3. Externe Links (Etsy)</h4><p>Unsere Website enthält Links zum Onlineshop "Etsy". Wenn Sie diese Links anklicken, verlassen Sie unsere Website. Bitte beachten Sie, dass für die Nutzung von Etsy die Datenschutzbestimmungen der Etsy Ireland UC gelten. Wir haben keinen Einfluss na die Datenerhebung und deren weitere Verwendung durch Etsy.</p></div>
                  <div><h4 className="font-bold text-stone-900 mb-2">4. Ihre Rechte</h4><p>Sie haben jederzeit das Recht, unentgeltlich Auskunft über Herkunft, Empfänger und Zweck Ihrer gespeicherten personenbezogenen Daten zu erhalten. Sie haben außerdem ein Recht, die Berichtigung, Sperrung oder Löschung dieser Daten zu verlangen. Hierzu sowie zu weiteren Fragen zum Thema Datenschutz können Sie sich jederzeit unter der im Impressum angegebenen Adresse an uns wenden.</p></div>
                  <div><h4 className="font-bold text-stone-900 mb-2">5. Analyse-Tools und Cookies</h4><p>Diese Website verwendet keine Cookies und keine Analyse-Tools (wie Google Analytics), um Ihr Nutzerverhalten nachzuverfolgen.</p></div>
                </div>
              </motion.div>
            </div>
          );
        };

        function App() {
          const [view, setView] = useState('home');
          const [activeCategory, setActiveCategory] = useState('Sve');
          const [selectedProduct, setSelectedProduct] = useState(null);
          const [activeImageIndex, setActiveImageIndex] = useState(0);
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [isImpressumOpen, setIsImpressumOpen] = useState(false);
          const [isDatenschutzOpen, setIsDatenschutzOpen] = useState(false);
          const [showImpressumDetails, setShowImpressumDetails] = useState(false);

          const categories = ['Sve', ...Array.from(new Set(PRODUCTS.flatMap(p => p.categories)))];
          const filteredProducts = activeCategory === 'Sve' ? PRODUCTS : PRODUCTS.filter(p => p.categories.includes(activeCategory));

          const navigateTo = (v, category = 'Sve') => {
            setView(v);
            setActiveCategory(category);
            setIsMenuOpen(false);
            window.scrollTo(0, 0);
          };

          return (
            <div className="min-h-screen flex flex-col animate-fade-in bg-stone-50">
              <ProductModal 
                selectedProduct={selectedProduct} 
                activeImageIndex={activeImageIndex} 
                setActiveImageIndex={setActiveImageIndex} 
                closeModal={() => setSelectedProduct(null)} 
              />

              <ImpressumModal 
                isImpressumOpen={isImpressumOpen} 
                setIsImpressumOpen={setIsImpressumOpen} 
                showImpressumDetails={showImpressumDetails} 
                setShowImpressumDetails={setShowImpressumDetails} 
              />

              <DatenschutzModal 
                isDatenschutzOpen={isDatenschutzOpen} 
                setIsDatenschutzOpen={setIsDatenschutzOpen} 
              />

                  <div className="flex items-center gap-2 cursor-pointer" onClick={() => navigateTo('home')}>
                    <Logo className="w-8 h-8 md:w-10 md:h-10" />
                    <span className="text-xl md:text-2xl font-bold tracking-tighter text-amber-950">NOVA VENTURI</span>
                  </div>
                  <div className="hidden md:flex items-center gap-8 font-medium text-stone-600">
                    <button onClick={() => navigateTo('collection')} className="hover:text-amber-900 transition-colors">Kolekcija</button>
                    <a href="https://www.etsy.com/shop/novaventuri/" target="_blank" rel="noopener noreferrer" className="px-5 py-2 bg-amber-950 text-white rounded-full hover:bg-amber-800 transition-colors flex items-center gap-2">
                      Etsy Trgovina <ExternalLink size={16} />
                    </a>
                  </div>
                  <button className="md:hidden p-2 text-stone-600" onClick={() => setIsMenuOpen(true)}>
                    <Menu size={28} />
                  </button>
                </div>
              </nav>

              {view === 'home' ? (
                <main className="pt-20">
                  <section className="relative min-h-[80vh] flex items-center px-6 overflow-hidden">
                    <div className="container mx-auto relative z-10">
                      <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }}>
                        <h1 className="text-4xl md:text-7xl font-bold text-stone-900 mb-6 leading-tight">Mali detalji, <br /><span className="text-amber-900 italic serif">velika priča.</span></h1>
                        <p className="text-lg md:text-xl text-stone-600 mb-10 max-w-xl">Unikatni drveni dodaci koji spajaju modernu tehnologiju i tradiciju.</p>
                        <button onClick={() => navigateTo('collection')} className="px-8 py-4 bg-amber-950 text-white rounded-xl font-bold text-lg flex items-center gap-2 shadow-lg">
                          Istraži kolekciju <ArrowRight size={20} />
                        </button>
                      </motion.div>
                    </div>
                  </section>

                  <section id="personalizacija" className="py-16 md:py-24 bg-amber-950 text-white px-6 relative overflow-hidden">
                    <div className="container mx-auto relative z-10 text-center">
                      <div className="inline-flex items-center justify-center w-12 h-12 md:w-16 md:h-16 bg-amber-900 rounded-xl md:rounded-2xl mb-6 md:mb-8 shadow-xl mx-auto">
                        <MessageSquare size={24} className="text-amber-200 md:w-8 md:h-8" />
                      </div>
                      <h2 className="text-3xl md:text-5xl font-bold mb-4 md:mb-6">Imate unikatnu ideju?</h2>
                      <p className="text-base md:text-xl text-amber-100/80 mb-8 md:mb-12 max-w-2xl mx-auto leading-relaxed">Bilo da želite personaliziranu gravuru na nekom od naših proizvoda ili imate potpuno novu ideju za drveni predmet, tu smo da je oživimo.</p>
                      <div className="flex justify-center">
                        <a 
                          href="mailto:info@novaventuri.com" 
                          className="px-12 py-5 bg-white text-amber-950 rounded-2xl font-bold text-xl hover:bg-amber-50 transition-all flex items-center justify-center gap-3 shadow-2xl hover:scale-105 active:scale-95"
                        >
                          Pošaljite upit putem emaila <Mail size={24} />
                        </a>
                      </div>
                    </div>
                  </section>
                </main>
              ) : (
                <main className="pt-32 pb-20 px-6 container mx-auto">
                  <div className="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
                    <div>
                      <h1 className="text-3xl md:text-5xl font-bold mb-4">Naša Kolekcija</h1>
                      <p className="text-stone-500 max-w-lg">Pregledajte našu ponudu unikatnih drvenih proizvoda. Svaki komad je pažljivo dizajniran i izrađen.</p>
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {categories.map(cat => (
                        <button 
                          key={cat} 
                          onClick={() => setActiveCategory(cat)}
                          className={`px-4 py-2 rounded-full text-sm font-bold transition-all ${activeCategory === cat ? 'bg-amber-950 text-white shadow-md' : 'bg-white text-stone-600 hover:bg-stone-100 border border-stone-200'}`}
                        >
                          {cat}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                    {filteredProducts.map(p => (
                      <div key={p.id} onClick={() => setSelectedProduct(p)} className="group bg-white rounded-2xl overflow-hidden shadow-sm border border-stone-100 hover:shadow-xl transition-all cursor-pointer">
                        <div className="h-64 overflow-hidden">
                          <img src={p.image} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt={p.name} referrerPolicy="no-referrer" />
                        </div>
                        <div className="p-6">
                          <h3 className="text-xl font-bold mb-2">{p.name}</h3>
                          <p className="text-amber-950 font-bold text-2xl">{p.price}</p>
                        </div>
                      </div>
                    ))}

                </main>
              )}

                  <div className="flex flex-col md:flex-row justify-between items-center gap-12 mb-12">
                    <div className="flex flex-col items-center md:items-start gap-4">
                      <div className="flex items-center gap-2">
                        <Logo className="w-8 h-8" dark={false} />
                        <span className="text-xl font-bold text-white tracking-widest uppercase">NOVA VENTURI</span>
                      </div>
                      <p className="text-stone-500 max-w-xs text-center md:text-left">Unikatni drveni detalji koji spajaju modernu tehnologiju i tradiciju.</p>
                    </div>
                    <div className="flex flex-col items-center md:items-end gap-6">

                        <a href="https://www.etsy.com/shop/novaventuri/" target="_blank" rel="noopener noreferrer" className="hover:text-amber-400 transition-colors">Etsy Shop</a>
                      </div>
                      <div className="flex gap-6 text-sm">
                        <button onClick={() => setIsImpressumOpen(true)} className="hover:text-white transition-colors">Impressum</button>
                        <button onClick={() => setIsDatenschutzOpen(true)} className="hover:text-white transition-colors">Datenschutz</button>
                      </div>
                    </div>
                  </div>
                  <div className="pt-8 border-t border-stone-800 text-center text-sm text-stone-600">
                    <p>© 2024 Nova Venturi Woodworking. Sva prava pridržana.</p>
                  </div>
                </div>
              </footer>

                <div className="fixed inset-0 z-[200] bg-white p-6 flex flex-col">
                  <div className="flex justify-between items-center mb-12">
                    <Logo className="w-8 h-8" />
                    <button onClick={() => setIsMenuOpen(false)}><X size={32} /></button>
                  </div>
                  <div className="flex flex-col gap-8 text-2xl font-bold">
                    <button onClick={() => navigateTo('home')}>Početna</button>
                    <button onClick={() => navigateTo('collection')}>Kolekcija</button>
                    <a href="https://www.etsy.com/shop/novaventuri/" target="_blank" rel="noopener noreferrer">Etsy Trgovina</a>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const rootElement = document.getElementById('root');
        if (rootElement) {
          const root = createRoot(rootElement);
          root.render(<App />);
        }
    </script>
</body>
</html>
