                    <button onClick={() => navigateTo('collection')} className="hover:text-amber-900 transition-colors relative after:absolute after:bottom-0 after:left-0 after:w-0 after:h-0.5 after:bg-amber-900 after:transition-all hover:after:w-full">Kolekcija</button>

                      Etsy Trgovina <ExternalLink size={16} />
                    </a>
                  </div>
                  <button className="md:hidden p-2 text-stone-600 hover:bg-stone-100 rounded-lg transition-colors" onClick={() => setIsMenuOpen(true)}>
                    <Menu size={28} />

                </div>
              </nav>

              {view === 'home' ? (

                    <div className="absolute top-0 right-0 w-1/2 h-full bg-stone-100/50 -skew-x-12 translate-x-1/4 hidden lg:block"></div>
                    <div className="container mx-auto relative z-10">

                        initial={{ y: 30, opacity: 0 }} 
                        animate={{ y: 0, opacity: 1 }}
                        transition={{ duration: 0.8 }}

                        <h1 className="text-5xl md:text-8xl font-bold text-stone-900 mb-8 leading-[1.1] tracking-tight">
                          Mali detalji, <br />
                          <span className="text-amber-900 italic serif">velika priča.</span>
                        </h1>
                        <p className="text-lg md:text-2xl text-stone-600 mb-12 max-w-xl leading-relaxed">

                        </p>
                        <div className="flex flex-col sm:flex-row gap-4">
                          <button onClick={() => navigateTo('collection')} className="px-10 py-5 bg-amber-950 text-white rounded-2xl font-bold text-lg flex items-center justify-center gap-3 shadow-xl shadow-amber-950/20 hover:bg-amber-900 transition-all hover:-translate-y-1">

                            Etsy Trgovina <ShoppingBag size={22} />
                          </a>
                        </div>
                      </motion.div>
                    </div>
                  </section>

                  {/* Personalizacija Section */}
                  <section id="personalizacija" className="py-20 md:py-32 bg-amber-950 text-white px-6 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                      <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <path d="M0 100 C 20 0 50 0 100 100" fill="none" stroke="white" strokeWidth="0.5" />
                      </svg>
                    </div>
                    <div className="container mx-auto relative z-10 text-center">
                      <motion.div
                        initial={{ opacity: 0, scale: 0.9 }}
                        whileInView={{ opacity: 1, scale: 1 }}

                        </div>
                        <h2 className="text-4xl md:text-6xl font-bold mb-6 md:mb-8 leading-tight">Imate unikatnu ideju?</h2>

                        </p>

                            Pošaljite upit <Mail size={24} className="group-hover:translate-x-1 transition-transform" />
                          </a>
                        </div>
                        <div className="mt-12 flex flex-wrap justify-center gap-8 text-amber-200/60 text-sm font-medium">

                          <span className="flex items-center gap-2"><CheckCircle2 size={16} /> Vrhunsko drvo</span>
                        </div>
                      </motion.div>
                    </div>
                  </section>
                </main>
              ) : (
                <main className="pt-32 pb-24 px-6 container mx-auto flex-grow">
                  <motion.div

                        <button 
                          key={cat} 
                          onClick={() => setActiveCategory(cat)}
                          className={`px-6 py-2.5 rounded-full text-sm font-bold transition-all ${activeCategory === cat ? 'bg-amber-950 text-white shadow-lg shadow-amber-950/20' : 'bg-white text-stone-600 hover:bg-stone-100 border border-stone-200'}`}
                        >
                          {cat}
                        </button>
                      ))}
                    </div>
                  </motion.div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
                    {filteredProducts.map((p, idx) => (
                      <motion.div 
                        key={p.id} 
                        initial={{ opacity: 0, y: 20 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ delay: idx * 0.1 }}
                        onClick={() => { setSelectedProduct(p); setActiveImageIndex(0); }} 
                        className="group bg-white rounded-3xl overflow-hidden shadow-sm border border-stone-100 hover:shadow-2xl transition-all duration-500 cursor-pointer flex flex-col h-full"
                      >
                        <div className="h-72 overflow-hidden relative">
                          <img 
                            src={p.image} 
                            className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" 
                            alt={p.name} 
                            referrerPolicy="no-referrer" 
                          />
                          <div className="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors duration-500"></div>
                        </div>
                        <div className="p-8 flex-grow flex flex-col justify-between">
                          <div>
                            <div className="flex gap-2 mb-3">
                              {p.categories.map((c, i) => (
                                <span key={i} className="text-[10px] font-bold uppercase tracking-widest text-stone-400">{c}</span>
                              ))}

                            <h3 className="text-2xl font-bold mb-3 text-stone-900 group-hover:text-amber-950 transition-colors">{p.name}</h3>

                          <div className="flex items-center justify-between mt-6">
                            <p className="text-amber-950 font-bold text-2xl">{p.price}</p>
                            <span className="w-10 h-10 rounded-full bg-stone-50 flex items-center justify-center text-stone-400 group-hover:bg-amber-950 group-hover:text-white transition-all">
                              <ArrowRight size={20} />

                          </div>
                        </div>
                      </motion.div>
                    ))}
                  </div>
                </main>

                    <div className="flex flex-col items-center md:items-start gap-6">
                      <div className="flex items-center gap-3">
                        <Logo className="w-10 h-10" dark={false} />
                        <span className="text-2xl font-bold text-white tracking-widest uppercase">NOVA VENTURI</span>
                      </div>

                        Unikatni drveni detalji koji spajaju modernu tehnologiju i tradiciju ručnog rada. Svaki komad je priča za sebe.
                      </p>
                      <div className="flex gap-4">
                        <a href="https://www.instagram.com/novaventuri/" target="_blank" rel="noopener noreferrer" className="w-10 h-10 rounded-full bg-stone-800 flex items-center justify-center text-white hover:bg-amber-900 transition-colors">
                          <Instagram size={20} />
                        </a>
                        <a href="https://www.facebook.com/novaventuri/" target="_blank" rel="noopener noreferrer" className="w-10 h-10 rounded-full bg-stone-800 flex items-center justify-center text-white hover:bg-amber-900 transition-colors">
                          <Facebook size={20} />
                        </a>
                      </div>
                    </div>
                    
                    <div className="flex flex-col items-center md:items-start gap-6">
                      <h4 className="text-white font-bold uppercase tracking-widest text-sm">Navigacija</h4>
                      <ul className="space-y-4 text-center md:text-left font-medium">
                        <li><button onClick={() => navigateTo('home')} className="hover:text-amber-400 transition-colors">Početna</button></li>
                        <li><button onClick={() => navigateTo('collection')} className="hover:text-amber-400 transition-colors">Kolekcija</button></li>
                        <li><a href="https://www.etsy.com/shop/novaventuri/" target="_blank" rel="noopener noreferrer" className="hover:text-amber-400 transition-colors">Etsy Trgovina</a></li>
                        <li><a href="mailto:info@novaventuri.com" className="hover:text-amber-400 transition-colors">Kontakt</a></li>
                      </ul>
                    </div>

                    <div className="flex flex-col items-center md:items-start gap-6">
                      <h4 className="text-white font-bold uppercase tracking-widest text-sm">Pravne informacije</h4>
                      <ul className="space-y-4 text-center md:text-left font-medium">
                        <li><button onClick={() => setIsImpressumOpen(true)} className="hover:text-white transition-colors">Impressum</button></li>
                        <li><button onClick={() => setIsDatenschutzOpen(true)} className="hover:text-white transition-colors">Datenschutz</button></li>
                        <li className="text-stone-600 text-xs pt-4">Glockenblumenstr. 46<br />70563 Stuttgart, Germany</li>
                      </ul>
                    </div>
                  </div>
                  
                  <div className="pt-10 border-t border-stone-800 flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-stone-600">
                    <p>© 2026 Nova Venturi Woodworking. Sva prava pridržana.</p>
                    <p className="flex items-center gap-1 italic">Crafted with passion for wood <CheckCircle2 size={14} /></p>
                  </div>
                </div>
              </footer>

              {/* MOBILNI MENU */}
              <AnimatePresence>
                {isMenuOpen && (
                  <motion.div 
                    initial={{ x: '100%' }}
                    animate={{ x: 0 }}
                    exit={{ x: '100%' }}
                    transition={{ type: 'spring', damping: 25, stiffness: 200 }}
                    className="fixed inset-0 z-[200] bg-white p-8 flex flex-col"
                  >
                    <div className="flex justify-between items-center mb-16">
                      <div className="flex items-center gap-2">
                        <Logo className="w-8 h-8" />
                        <span className="text-xl font-bold tracking-tighter text-amber-950 uppercase">NOVA VENTURI</span>
                      </div>
                      <button onClick={() => setIsMenuOpen(false)} className="p-2 hover:bg-stone-100 rounded-full transition-colors">
                        <X size={32} />
                      </button>
                    </div>
                    <div className="flex flex-col gap-10 text-4xl font-bold text-stone-900">
                      <button onClick={() => navigateTo('home')} className="text-left hover:text-amber-900 transition-colors">Početna</button>
                      <button onClick={() => navigateTo('collection')} className="text-left hover:text-amber-900 transition-colors">Kolekcija</button>
                      <a href="https://www.etsy.com/shop/novaventuri/" target="_blank" rel="noopener noreferrer" className="text-left hover:text-amber-900 transition-colors">Etsy Trgovina</a>
                    </div>
                    <div className="mt-auto pt-12 border-t border-stone-100 flex flex-col gap-6">
                      <p className="text-stone-400 font-medium">Pratite nas:</p>
                      <div className="flex gap-6">
                        <a href="https://www.instagram.com/novaventuri/" target="_blank" rel="noopener noreferrer" className="text-stone-600 hover:text-amber-900"><Instagram size={28} /></a>
                        <a href="https://www.facebook.com/novaventuri/" target="_blank" rel="noopener noreferrer" className="text-stone-600 hover:text-amber-900"><Facebook size={28} /></a>
                        <a href="mailto:info@novaventuri.com" className="text-stone-600 hover:text-amber-900"><Mail size={28} /></a>
                      </div>
                    </div>
                  </motion.div>
                )}
              </AnimatePresence>
            </div>
          );
        }

        // MONTAŽA APLIKACIJE
        const rootElement = document.getElementById('root');
        if (rootElement) {
          const root = createRoot(rootElement);
          root.render(<App />);
        }
    </script>
</body>
</html>
