<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Nova Venturi | Ručno izrađeni drveni detalji</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @layer base {
            html { scroll-behavior: smooth; }
            body { font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
            .serif { font-family: 'Playfair Display', serif; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.6s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.3s ease-out forwards; }
        
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>

    <script>
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        amber: { 50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a', 300: '#fcd34d', 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309', 800: '#92400e', 900: '#78350f', 950: '#451a03' },
                        stone: { 50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4', 300: '#d6d3d1', 400: '#a8a29e', 500: '#78716c', 600: '#57534e', 700: '#44403c', 800: '#292524', 900: '#1c1917' }
                    },
                    screens: {
                        'xs': '480px',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-stone-50 text-stone-900">
    <div id="root"></div>

    <script type="module">
        import { h, render } from 'https://esm.sh/preact';
        import { useState, useEffect } from 'https://esm.sh/preact/hooks';
        import htm from 'https://esm.sh/htm';

        const html = htm.bind(h);

        // --- ICONS (Lucide equivalents) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const paths = {
                ShoppingBag: '<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/>',
                ArrowRight: '<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
                ExternalLink: '<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>',
                Menu: '<line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/>',
                X: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
                ChevronLeft: '<path d="m15 18-6-6 6-6"/>',
                ChevronRight: '<path d="m9 18 6-6-6-6"/>',
                Filter: '<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>',
                ArrowLeft: '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
                TapeMeasure: '<circle cx="15" cy="15" r="6.5" stroke="currentColor" stroke-width="2"/><circle cx="15" cy="15" r="2" stroke="currentColor" stroke-width="2"/><path d="M9 13c-1.5-1.5-3.5-5-3.5-8" stroke="currentColor" stroke-width="2"/><path d="M5.5 5h4" stroke="currentColor" stroke-width="2"/><path d="M6.5 8.5l1.5 1.5" stroke="currentColor" stroke-width="2"/><path d="M8 11.5l1.5 1.5" stroke="currentColor" stroke-width="2"/>',
                Tree: '<path d="M12 22c-0.8 0-1.5-0.8-1.5-2.5 0-1 0.8-2 1.5-3.5 0.7 1.5 1.5 2.5 1.5 3.5 0 1.7-0.7 2.5-1.5 2.5z" fill="currentColor"/><path d="M12 16c-3 0-5.5-2.5-5.5-5.5 0-1.3 0.5-2.5 1.3-3.5C7 6 6.5 5 6.5 4c0-2 1.5-3.5 3.5-3.5 1 0 1.8 0.4 2.5 1 0.7-0.6 1.5-1 2.5-1 2 0 3.5 1.5 3.5 3.5 0 1-0.5 2-1.3 3 0.8 1 1.3 2.2 1.3 3.5 0 3-2.5 5.5-5.5 5.5z" fill="currentColor"/>',
                Info: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>',
                Instagram: '<rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>',
                Facebook: '<path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>',
                Mail: '<rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>',
                MessageSquare: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'
            };

            const content = paths[name];
            if (!content) return null;

            return html`
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width=${size} 
                    height=${size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    stroke-width="2" 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    class=${className}
                    dangerouslySetInnerHTML=${{ __html: content }}
                />
            `;
        };

        // --- DATA ---
        const PRODUCTS = [
            {
                id: 'nv-wrist-rest-collection',
                name: 'Drveni Wrist Rest - Premium Orah',
                description: 'Ergonomski oslonac za zapešće izrađen od punog drveta oraha. Dostupan u raznim veličinama i teksturama, svaki komad je ručno obrađen pčelinjim voskom za vrhunsku glatkoću i trajnost.',
                price: 'od 28,95 €',
                image: 'https://i.etsystatic.com/46489053/r/il/46b935/5556485693/il_794xN.5556485693_d7be.jpg',
                category: 'Uredski dodaci',
                images: [
                    'https://i.etsystatic.com/46489053/r/il/46b935/5556485693/il_794xN.5556485693_d7be.jpg',
                    'https://i.etsystatic.com/46489053/r/il/499422/5556485645/il_794xN.5556485645_wuq8.jpg',
                    'https://i.etsystatic.com/46489053/r/il/162420/5508372064/il_794xN.5508372064_tjvc.jpg',
                    'https://i.etsystatic.com/46489053/r/il/057b5e/5556485677/il_794xN.5556485677_dbbf.jpg'
                ],
                etsyUrl: 'https://www.etsy.com/de-en/listing/1597753670/keyboard-wrist-rest-with-storage-wooden'
            },
            {
                id: 'nv-welcome-decor',
                name: 'Personalizirani natpis dobrodošlice',
                description: 'Prekrasan personalizirani natpis dobrodošlice koji svakom domu daje toplinu i karakter. Izrađen od biranog drveta s preciznim laserskim rezom i ručnom završnom obradom. Savršen poklon za useljenje ili vjenčanje.',
                price: '23,95 €',
                image: 'https://i.etsystatic.com/46489053/r/il/ac2412/6846190149/il_794xN.6846190149_mlxe.jpg',
                category: 'Dekoracije za dom',
                images: [
                    'https://i.etsystatic.com/46489053/r/il/ac2412/6846190149/il_794xN.6846190149_mlxe.jpg',
                    'https://i.etsystatic.com/46489053/r/il/b9a5b7/6798186960/il_794xN.6798186960_f3tc.jpg',
                    'https://i.etsystatic.com/46489053/r/il/d00e20/6846190143/il_794xN.6846190143_47im.jpg',
                    'https://i.etsystatic.com/46489053/r/il/192a83/6846190147/il_794xN.6846190147_oopl.jpg'
                ],
                etsyUrl: 'https://www.etsy.com/de-en/listing/1904425975/personalized-home-decor-home-sweet-home'
            },
            {
                id: 'nv-key-organizer',
                name: 'Držač ključeva i pošte - Modern',
                description: 'Elegantan zidni organizator koji spaja funkcionalnost i estetiku. Izrađen od vrhunskog drveta, sadrži utor za poštu i čvrste magnete ili kukice za ključeve. Minimalistički dizajn koji unosi red u vaš ulazni prostor.',
                price: 'od 24,95 €',
                image: 'https://i.etsystatic.com/46489053/r/il/05ce4c/5418174233/il_794xN.5418174233_a9zo.jpg',
                category: 'Organizacija',
                images: [
                    'https://i.etsystatic.com/46489053/r/il/05ce4c/5418174233/il_794xN.5418174233_a9zo.jpg',
                    'https://i.etsystatic.com/46489053/r/il/07749f/5370006498/il_794xN.5370006498_b62a.jpg',
                    'https://i.etsystatic.com/46489053/r/il/0a4e70/5370006478/il_794xN.5370006478_mry9.jpg',
                    'https://i.etsystatic.com/46489053/r/il/20ce9f/5370006482/il_794xN.5370006482_oyiy.jpg',
                    'https://i.etsystatic.com/46489053/r/il/c43632/5370008864/il_794xN.5370008864_4s6g.jpg'
                ],
                etsyUrl: 'https://www.etsy.com/de-en/listing/1582519039/key-board-mail-organizer-entryway'
            },
            {
                id: 'nv-oak-cutting-board',
                name: 'Personalizirana daska za rezanje',
                description: 'Ručno izrađena daska za rezanje od vrhunskog hrasta. Izuzetno izdržljiva i jedinstvena, s mogućnošću personalizirane laserske gravure. Savršen poklon za useljenje, vjenčanje ili kao poseban detalj u vašoj kuhinji.',
                price: 'od 29,95 €',
                image: 'https://i.etsystatic.com/46489053/r/il/32f296/6831720267/il_794xN.6831720267_gj03.jpg',
                category: 'Kuhinja',
                images: [
                    'https://i.etsystatic.com/46489053/r/il/32f296/6831720267/il_794xN.6831720267_gj03.jpg',
                    'https://i.etsystatic.com/46489053/r/il/a6cb89/6783711926/il_794xN.6783711926_ms7c.jpg',
                    'https://i.etsystatic.com/46489053/r/il/881911/6831720265/il_794xN.6831720265_rsz9.jpg',
                    'https://i.etsystatic.com/46489053/r/il/9adaf6/6831721345/il_794xN.6831721345_ca6h.jpg'
                ],
                etsyUrl: 'https://www.etsy.com/de-en/listing/1887342412/personalized-cutting-board-oak-cutting'
            }
        ];

        // --- COMPONENTS ---
        const Logo = ({ className = "w-10 h-10", dark = true }) => html`
            <div class="${className} flex items-center justify-center relative ${dark ? 'text-amber-950' : 'text-white'}">
                <svg viewBox="0 0 100 100" class="w-full h-full overflow-visible">
                    <text x="10" y="45" font-family="'Playfair Display', serif" font-size="55" font-weight="bold" fill="currentColor">N</text>
                    <line x1="15" y1="90" x2="85" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <text x="50" y="90" font-family="'Playfair Display', serif" font-size="55" font-weight="bold" fill="currentColor">V</text>
                </svg>
            </div>
        `;

        const App = () => {
            const [view, setView] = useState('home');
            const [activeCategory, setActiveCategory] = useState('Sve');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [activeImageIndex, setActiveImageIndex] = useState(0);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', email: '', message: '' });
            const [formStatus, setFormStatus] = useState('idle');

            useEffect(() => { window.scrollTo(0, 0); }, [view]);

            const categories = ['Sve', ...new Set(PRODUCTS.map(p => p.category))];
            const filteredProducts = activeCategory === 'Sve' ? PRODUCTS : PRODUCTS.filter(p => p.category === activeCategory);

            const navigateTo = (v) => { setView(v); setIsMenuOpen(false); };
            const openModal = (p) => { setSelectedProduct(p); setActiveImageIndex(0); document.body.style.overflow = 'hidden'; };
            const closeModal = () => { setSelectedProduct(null); document.body.style.overflow = 'auto'; };

            const handleFormSubmit = async (e) => {
                e.preventDefault();
                setFormStatus('submitting');
                try {
                    await fetch('https://script.google.com/macros/s/AKfycbzusiP5vwbfjE5Vh8Oo4TkXIhKynSfcUvJJCZSTlLtEOg49nLtFQ3s0nxpH9Eyv1q2Q/exec', {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(formData),
                    });
                    setFormStatus('success');
                    setFormData({ name: '', email: '', message: '' });
                    setTimeout(() => setFormStatus('idle'), 5000);
                } catch (error) {
                    setFormStatus('error');
                    setTimeout(() => setFormStatus('idle'), 5000);
                }
            };

            const Modal = () => {
                if (!selectedProduct) return null;
                const gallery = selectedProduct.images || [selectedProduct.image];
                return html`
                    <div class="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-10 animate-fade-in">
                        <div class="absolute inset-0 bg-stone-900/80 backdrop-blur-sm" onClick=${closeModal}></div>
                        <div class="relative bg-white w-full max-w-5xl max-h-[90vh] rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row animate-zoom-in">
                            <button onClick=${closeModal} class="absolute top-4 right-4 z-20 p-2 bg-white/90 rounded-full shadow-sm hover:bg-stone-100 transition-colors"><${Icon} name="X" size=${24} /></button>
                            <div class="w-full md:w-1/2 bg-stone-50 flex flex-col">
                                <div class="relative flex-grow h-[300px] md:h-auto overflow-hidden">
                                    <img src=${gallery[activeImageIndex]} class="w-full h-full object-cover" />
                                    ${gallery.length > 1 && html`
                                        <div class="absolute inset-0 flex items-center justify-between px-4">
                                            <button onClick=${() => setActiveImageIndex(i => i === 0 ? gallery.length - 1 : i - 1)} class="p-2 bg-white/50 rounded-full shadow-sm hover:bg-white/80 transition-all"><${Icon} name="ChevronLeft" /></button>
                                            <button onClick=${() => setActiveImageIndex(i => i === gallery.length - 1 ? 0 : i + 1)} class="p-2 bg-white/50 rounded-full shadow-sm hover:bg-white/80 transition-all"><${Icon} name="ChevronRight" /></button>
                                        </div>
                                    `}
                                </div>
                                ${gallery.length > 1 && html`
                                    <div class="p-4 flex gap-2 overflow-x-auto bg-stone-100/50 no-scrollbar">
                                        ${gallery.map((img, idx) => html`
                                            <button key=${idx} onClick=${() => setActiveImageIndex(idx)} class="relative flex-shrink-0 w-16 h-16 rounded-lg overflow-hidden border-2 transition-all ${activeImageIndex === idx ? 'border-amber-900' : 'border-transparent opacity-60'}">
                                                <img src=${img} class="w-full h-full object-cover" />
                                            </button>
                                        `)}
                                    </div>
                                `}
                            </div>
                            <div class="w-full md:w-1/2 p-6 md:p-12 overflow-y-auto flex flex-col">
                                <div class="flex-grow">
                                    <span class="px-3 py-1 bg-stone-100 text-stone-500 rounded-full text-[10px] md:text-xs font-bold uppercase mb-4 inline-block">${selectedProduct.category}</span>
                                    <h2 class="text-2xl md:text-4xl font-bold mb-3 md:mb-4 text-stone-900">${selectedProduct.name}</h2>
                                    <p class="text-2xl md:text-3xl font-bold text-amber-950 mb-4 md:mb-6">${selectedProduct.price}</p>
                                    <div class="mb-6 md:mb-8">
                                        <h4 class="text-xs font-bold uppercase tracking-wider text-stone-400 mb-2">O proizvodu</h4>
                                        <p class="text-stone-600 leading-relaxed text-sm md:text-base">${selectedProduct.description}</p>
                                    </div>
                                </div>
                                <div class="space-y-4">
                                    <a href=${selectedProduct.etsyUrl || "https://www.etsy.com/shop/novaventuri/"} target="_blank" class="w-full py-4 bg-amber-950 text-white rounded-xl font-bold text-lg flex items-center justify-center gap-2 shadow-lg shadow-amber-950/20 hover:bg-amber-900 transition-all">Kupi na Etsy-u <${Icon} name="ExternalLink" size=${20} /></a>
                                    <p class="text-center text-[10px] md:text-xs text-stone-400 italic">*Svi naši proizvodi su unikatni. Drvo može varirati u nijansi i teksturi.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            };

            if (view === 'collection') {
                return html`
                    <div class="min-h-screen bg-stone-50 flex flex-col animate-fade-in">
                        <${Modal} />
                        <nav class="sticky top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-stone-200 h-16 md:h-20 flex items-center px-4 md:px-6 justify-between">
                            <button onClick=${() => navigateTo('home')} class="flex items-center gap-1 md:gap-2 text-stone-600 hover:text-amber-900 transition-colors font-medium text-sm md:text-base">
                                <${Icon} name="ArrowLeft" /> <span class="hidden xs:inline">Povratak</span>
                            </button>
                            <div class="flex items-center gap-2"><${Logo} className="w-6 h-6 md:w-8 md:h-8" /><span class="text-lg md:text-xl font-bold text-amber-950 uppercase">Kolekcija</span></div>
                            <a href="https://www.etsy.com/shop/novaventuri/" target="_blank" class="text-amber-900 font-bold text-xs md:text-base flex items-center gap-1">Više na Etsy <${Icon} name="ExternalLink" size=${14} /></a>
                        </nav>
                        <main class="flex-grow py-8 md:py-16 px-4 md:px-6 container mx-auto">
                            <div class="max-w-2xl mb-8 md:mb-12">
                                <h1 class="text-3xl md:text-5xl font-bold text-stone-900 mb-3 md:mb-4">Naša Potpuna Kolekcija</h1>
                                <p class="text-base md:text-xl text-stone-600 leading-relaxed">Svaki komad u našoj kolekciji je pažljivo osmišljen i ručno izrađen.</p>
                            </div>
                            <div class="flex items-center gap-3 mb-8 md:mb-12 overflow-x-auto pb-4 no-scrollbar">
                                <div class="flex items-center gap-2 text-stone-400 flex-shrink-0 mr-2"><${Icon} name="Filter" size=${16} /> <span class="text-[10px] md:text-sm font-bold uppercase tracking-wider">Filtriraj:</span></div>
                                ${categories.map(cat => html`
                                    <button key=${cat} onClick=${() => setActiveCategory(cat)} class="px-4 md:px-6 py-1.5 md:py-2 rounded-full font-semibold transition-all whitespace-nowrap text-xs md:text-base ${activeCategory === cat ? 'bg-amber-900 text-white shadow-md' : 'bg-white text-stone-600 border border-stone-200 hover:border-amber-900/30'}">${cat}</button>
                                `)}
                            </div>
                            <div class="grid grid-cols-1 xs:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-10">
                                ${filteredProducts.map(p => html`
                                    <div key=${p.id} onClick=${() => openModal(p)} class="group bg-white rounded-2xl overflow-hidden shadow-sm border border-stone-100 hover:shadow-2xl transition-all duration-500 cursor-pointer">
                                        <div class="h-72 overflow-hidden relative">
                                            <img src=${p.image} class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                            ${p.images && html`<div class="absolute top-4 right-4 bg-amber-900/80 backdrop-blur-sm text-white text-[10px] font-bold px-2 py-1 rounded-md">GALERIJA (${p.images.length})</div>`}
                                            <div class="absolute top-4 left-4"><span class="px-3 py-1 bg-white/90 backdrop-blur shadow-sm rounded-full text-xs font-bold text-stone-600 uppercase">${p.category}</span></div>
                                        </div>
                                        <div class="p-8">
                                            <h3 class="text-2xl font-bold mb-3 group-hover:text-amber-900 transition-colors">${p.name}</h3>
                                            <p class="text-stone-500 text-sm mb-6 leading-relaxed h-12 line-clamp-2">${p.description}</p>
                                            <div class="flex items-center justify-between pt-4 border-t border-stone-50">
                                                <span class="text-3xl font-bold text-stone-900">${p.price}</span>
                                                <span class="flex items-center gap-2 text-amber-900 font-bold text-sm">Detalji <${Icon} name="ArrowRight" size=${16} /></span>
                                            </div>
                                        </div>
                                    </div>
                                `)}
                            </div>
                        </main>
                        <footer class="bg-stone-900 text-stone-400 py-12">
                            <div class="container mx-auto px-6 text-center">
                                <div class="flex items-center justify-center gap-2 mb-6"><${Logo} className="w-6 h-6" dark=${false} /><span class="text-lg font-bold text-white uppercase tracking-widest">NOVA VENTURI</span></div>
                                <p class="text-sm">Ručna izrada • Bezvremenski dizajn • Održivi materijali</p>
                            </div>
                        </footer>
                    </div>
                `;
            }

            return html`
                <div class="min-h-screen flex flex-col animate-fade-in">
                    <${Modal} />
                    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-stone-200">
                        <div class="container mx-auto px-6 h-20 flex items-center justify-between">
                            <div class="flex items-center gap-2 cursor-pointer" onClick=${() => navigateTo('home')}>
                                <${Logo} className="w-8 h-8 md:w-10 md:h-10" />
                                <span class="text-xl md:text-2xl font-bold tracking-tighter text-amber-950">NOVA VENTURI</span>
                            </div>
                            <div class="hidden md:flex items-center gap-8 font-medium text-stone-600">
                                <button onClick=${() => navigateTo('collection')} class="hover:text-amber-900 transition-colors">Kolekcija</button>
